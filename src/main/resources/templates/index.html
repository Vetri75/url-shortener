<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Scalable URL Shortener</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
            min-height: 100vh;
        }

        .main-card{
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .hero{
            background: #111827;
            color: white;
            padding: 40px;
        }

        .hero p{
            color: #d1d5db;
        }

        .section{
            padding: 35px;
        }

        .form-control{
            border-radius: 12px;
            padding: 12px;
        }

        .btn-dark{
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: 600;
        }

        .result-box{
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
        }

        .analytics-card{
            background: #111827;
            color: white;
            border-radius: 16px;
            padding: 25px;
        }

        .analytics-card h2{
            font-size: 48px;
            font-weight: bold;
        }

        .short-link{
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg main-card">

                <!-- HERO SECTION -->

                <div class="hero">

                    <h1 class="display-5 fw-bold">
                        Scalable URL Shortener
                    </h1>

                    <p class="mt-3">
                        Spring Boot • Redis • MySQL • Railway • Upstash
                    </p>

                </div>

                <!-- SHORTENER SECTION -->

                <div class="section">

                    <h3 class="mb-4">
                        Create Short URL
                    </h3>

                    <div th:if="${error}"
                         class="alert alert-danger">

                        <span th:text="${error}"></span>

                    </div>

                    <form action="/shorten-ui"
                          method="post">

                        <div class="mb-3">

                            <label class="form-label">
                                Long URL
                            </label>

                            <input type="text"
                                   name="longUrl"
                                   class="form-control"
                                   placeholder="https://example.com"
                                   required>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Custom Alias
                                </label>

                                <input type="text"
                                       name="customAlias"
                                       class="form-control"
                                       placeholder="optional">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Expiry Days
                                </label>

                                <input type="number"
                                       name="expiryInDays"
                                       class="form-control"
                                       placeholder="optional">

                            </div>

                        </div>

                        <button type="submit"
                                class="btn btn-dark">

                            Shorten URL

                        </button>

                    </form>

                    <div th:if="${shortUrl}"
                         class="result-box mt-4">

                        <p class="text-muted mb-2">
                            Generated Short URL
                        </p>

                        <a th:href="${shortUrl}"
                           th:text="${shortUrl}"
                           class="short-link">
                        </a>

                    </div>

                </div>

                <!-- ANALYTICS SECTION -->

                <div class="section border-top">

                    <h3 class="mb-4">
                        Analytics
                    </h3>

                    <form action="/analytics-ui"
                          method="get">

                        <div class="mb-3">

                            <label class="form-label">
                                Enter Shortcode
                            </label>

                            <input type="text"
                                   name="shortCode"
                                   class="form-control"
                                   placeholder="abc123"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-dark">

                            Get Click Count

                        </button>

                    </form>

                    <div th:if="${clickCount != null}"
                         class="analytics-card mt-4">

                        <p class="mb-2">
                            Total Clicks
                        </p>

                        <h2 th:text="${clickCount}"></h2>

                    </div>

                    <div th:if="${analyticsError}"
                         class="alert alert-danger mt-4">

                        <span th:text="${analyticsError}"></span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
